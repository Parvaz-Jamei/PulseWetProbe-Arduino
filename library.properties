sentence=MCU-only pulsed electrode wetness, soil moisture, conductivity trend, and surface-state sensing.
paragraph=PulseWetProbe is an Arduino library for MCU-only two-plate electrode sensing. It supports high/low pulsed drive, reversible two-plate role swapping, dry/wet and multi-point calibration, board-aware defaults, analogReadResolution-aware normalization, guarded ESP32 touch sensing when available, fixed-memory noise filtering, pro diagnostics, CSV output, optional JSON outside tiny mode, power-aware sampling, and anti-corrosion Hi-Z rest behavior. It does not claim certified EC, salinity, freezing-point, or RWIS accuracy.
