; Optional local smoke project for users who prefer PlatformIO.
; PulseWetProbe remains a normal Arduino library; library.json is the package manifest.

[platformio]
default_envs = uno
src_dir = test/platformio_smoke/src

[env]
framework = arduino
lib_extra_dirs = .

[env:uno]
platform = atmelavr
board = uno

[env:esp32dev]
platform = espressif32
board = esp32dev
